<h1>Dados pessoais</h1>

<div>
    <label for="nome">Nome</label>
    <input type="text" id="nome" [(ngModel)]="campoNome">
</div>

<div>
    <label for="sbrenome">Sobrenome</label>
    <input type="text" id="sobrenome" [(ngModel)]="campoSobrenome">
</div>

<div>
    <label for="idade">Idade</label>
    <input type="number" id="idade" [(ngModel)]="campoIdade">
</div>

<div>
    <button (click)="apresentarDados()">Apresentar</button>
</div>
